<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SemilleroComunal — Iniciar Sesión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif }
    body { background: linear-gradient(135deg, #0C447C, #1D9E75); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px }
    .card { background: white; border-radius: 20px; padding: 36px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2) }
    .logo { font-size: 48px; margin-bottom: 10px }
    h1 { color: #0C447C; font-size: 22px; margin-bottom: 8px }
    .sub { color: #64748b; font-size: 13px; margin-bottom: 24px }
    .fg { margin-bottom: 16px; text-align: left }
    .fg label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px }
    .fg input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; transition: all 0.2s }
    .fg input:focus { outline: none; border-color: #0C447C; box-shadow: 0 0 0 3px rgba(12,68,124,0.1) }
    .btn { width: 100%; padding: 12px; background: #0C447C; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s }
    .btn:hover { background: #185FA5 }
    .error { background: #FCEBEB; color: #791F1F; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; border: 1px solid #FECACA; text-align: left }
    .footer-links { margin-top: 20px; font-size: 12px; display: flex; justify-content: space-between }
    .footer-links a { color: #0C447C; text-decoration: none; font-weight: 600 }
    .footer-links a:hover { text-decoration: underline }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">🌱</div>
  <h1>{{ nombre_comuna }}</h1>
  <p class="sub">Ingresa tus credenciales para continuar</p>

  {% if error %}
    <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <!-- CORRECCIÓN APLICADA: autocomplete="username" -->
    <div class="fg">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" value="{{ username_val }}" required autofocus autocomplete="username" placeholder="Ej. admin">
    </div>

    <!-- CORRECCIÓN APLICADA: autocomplete="current-password" -->
    <div class="fg">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
    </div>

    <button type="submit" class="btn">Ingresar →</button>
  </form>

  <div class="footer-links">
    <a href="/recuperar">¿Olvidaste tu contraseña?</a>
    <!-- Opcional: Si necesitas un link de ayuda -->
    <!-- <a href="#">Ayuda</a> -->
  </div>
</div>

</body>
</html>
